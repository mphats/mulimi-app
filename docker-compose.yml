services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    environment:
      DJANGO_SECRET_KEY: change-me
      DEBUG: "false"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_HOST: db
      DB_PORT: "5432"
      API_KEYS: dev-key-123
      CORS_ALLOW_ALL: "true"
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pgdata:


redis:
  image: redis:7
  ports:
    - "6379:6379"
